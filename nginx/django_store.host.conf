upstream django_store {
    server 127.0.0.1:8000;
}

server {
    listen 8080;
    server_name ajr.bilnov.com; # Replace with your domain

    client_max_body_size 20M;

    # Static files
    location /static/ {
        alias /home/ubuntu/sites/ajr/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media files
    location /media/ {
        alias /home/ubuntu/sites/ajr/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy to Gunicorn/Daphne
    location / {
        proxy_pass http://django_store;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support (for Daphne/SSE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
